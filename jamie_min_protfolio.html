<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Jamie Min — Portfolio</title>
<meta name="description" content="Jamie Min — Bilingual Digital Marketer. M.S. Digital Marketing & Analytics, Cal Poly Pomona." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Caveat:wght@400;600;700&family=Space+Mono:wght@400;700&family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#fafaf6;
    --ink:#171717;
    --ink-soft:#3a3025;
    --ink-mute:#7a6a52;
    --rule:rgba(0,0,0,.10);
    --accent-warm:#c87b56;
    --accent-deep:#a05a3c;
    --accent-teal:#2e5b5b;
    --accent-plum:#7a4a6a;
    --accent-rose:#c47a85;
    --gold:#b89855;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  html{scroll-behavior:smooth}
  body{
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    background:var(--paper);
    color:var(--ink);
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    line-height:1.55;
  }
  body::before{
    content:"";
    position:fixed;inset:0;
    background:
      radial-gradient(ellipse at 18% 12%, rgba(255,240,210,.30), transparent 55%),
      radial-gradient(ellipse at 88% 88%, rgba(200,220,220,.22), transparent 55%);
    pointer-events:none;z-index:0;
  }
  body::after{
    content:"";
    position:fixed;inset:0;
    background-image:radial-gradient(rgba(0,0,0,.022) 1px, transparent 1px);
    background-size:3px 3px;
    pointer-events:none;z-index:1;mix-blend-mode:multiply;opacity:.5;
  }
  #root{position:relative;z-index:2}
  a{color:inherit;text-decoration:none}
  button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
  img{display:block;max-width:100%}

  /* ------------------------------ NAV ------------------------------------ */
  .nav{
    position:fixed;top:0;left:0;right:0;z-index:60;
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
    padding:22px 38px;
    background:linear-gradient(to bottom, rgba(250,250,246,.92), rgba(250,250,246,0));
    backdrop-filter:saturate(140%) blur(10px);
    -webkit-backdrop-filter:saturate(140%) blur(10px);
  }
  .nav-brand{
    font-family:'Inter',sans-serif;font-weight:700;font-size:14px;
    letter-spacing:.34em;text-transform:uppercase;color:var(--ink);
  }
  .nav-links{display:flex;gap:44px;align-items:center;justify-self:center}
  .nav-link{
    font-family:'Inter',sans-serif;
    font-size:12px;letter-spacing:.26em;text-transform:uppercase;
    color:var(--ink);font-weight:500;
    opacity:.62;transition:opacity .2s ease, color .2s ease;
    position:relative;padding:6px 0;
  }
  .nav-link:hover{opacity:1}
  .nav-link.active{opacity:1;color:var(--accent-warm)}
  .nav-link.active::after{
    content:"";position:absolute;left:0;right:0;bottom:-2px;height:1.5px;
    background:var(--accent-warm);
  }
  .nav-right{justify-self:end;display:flex;gap:16px;align-items:center}
  .nav-mark{
    font-family:'Caveat',cursive;font-weight:600;font-size:18px;
    color:var(--accent-warm);transform:rotate(-2deg);
  }

  /* ------------------------------ HERO ----------------------------------- */
  .hero{
    position:relative;min-height:100vh;width:100%;overflow:hidden;
  }
  .hero-stage{
    position:relative;width:100%;height:100vh;min-height:680px;
    display:flex;align-items:center;justify-content:center;
  }
  .hero-title-wrap{
    position:relative;z-index:10;text-align:center;pointer-events:none;
    padding:0 24px;
  }
  .hero-title{
    display:block;
    font-family:'Fraunces',serif;
    font-weight:200;
    font-size:clamp(60px, 10vw, 156px);
    line-height:.96;
    letter-spacing:.04em;
    color:var(--ink);
  }
  .hero-title .first{font-style:normal;font-weight:200}
  .hero-title .last{font-style:italic;font-weight:300;color:var(--ink);margin-left:.16em}
  .hero-sub{
    display:block;
    margin-top:34px;
    font-family:'Cormorant Garamond',serif;
    font-style:italic;font-weight:400;
    font-size:clamp(15px,1.45vw,20px);
    letter-spacing:.12em;color:var(--ink-soft);
    max-width:760px;margin-left:auto;margin-right:auto;
  }

  /* --------------------- FLOATING SESSION OBJECTS ------------------------ */
  .fc{
    position:absolute;
    cursor:pointer;
    will-change:transform;
    user-select:none;
    background:transparent;
    text-align:center;
    width:150px;
    z-index:5;
  }
  /* corner positions — CSS-driven, NOT JS-driven */
  .fc.pos-tl{ top: 14%;    left: 10%; }
  .fc.pos-tr{ top: 14%;    right: 10%; }
  .fc.pos-bl{ bottom: 16%; left: 11%; }
  .fc.pos-br{ bottom: 16%; right: 11%; }

  .fc-inner{
    transition:transform .35s cubic-bezier(.2,.8,.2,1), filter .35s ease;
    transform-origin:center center;
    display:flex;flex-direction:column;align-items:center;
  }
  .fc:hover .fc-inner{
    transform:translateY(-10px) scale(1.06);
    filter:drop-shadow(0 18px 24px rgba(0,0,0,.14));
  }
  .fc-illu{
    width:120px;height:120px;
    display:flex;align-items:center;justify-content:center;
  }
  .fc-illu svg{
    width:100%;height:100%;
    filter:drop-shadow(0 8px 12px rgba(0,0,0,.10));
  }
  .fc-label{
    margin-top:18px;
    font-family:'Inter',sans-serif;
    font-size:11.5px;letter-spacing:.42em;text-transform:uppercase;
    color:var(--ink);font-weight:500;
    opacity:.78;transition:opacity .25s ease, color .25s ease;
  }
  .fc:hover .fc-label{opacity:1;color:var(--accent-warm)}

  /* ---------------------------- SUB PAGES -------------------------------- */
  .page{
    position:relative;z-index:2;
    padding:140px 8vw 120px;
    max-width:1480px;margin:0 auto;
  }
  .page-header{margin-bottom:70px}
  .page-eyebrow{
    font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.4em;
    text-transform:uppercase;color:var(--ink-mute);margin-bottom:18px;
    display:inline-flex;align-items:center;gap:14px;
  }
  .page-eyebrow .line{width:30px;height:1px;background:var(--ink-mute);opacity:.6}
  .page-title{
    font-family:'Fraunces',serif;font-weight:300;
    font-size:clamp(52px,8.6vw,116px);line-height:.98;letter-spacing:-.01em;
    color:var(--ink);
  }
  .page-title em{font-style:italic;font-weight:400}
  .page-title em.warm{color:var(--accent-warm)}
  .page-title em.teal{color:var(--accent-teal)}
  .page-title em.plum{color:var(--accent-plum)}
  .page-title em.rose{color:var(--accent-rose)}
  .page-lede{
    margin-top:32px;
    font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;
    font-size:clamp(19px,2vw,25px);line-height:1.5;color:var(--ink-soft);
    max-width:760px;
  }
  .back-link{
    display:inline-flex;align-items:center;gap:10px;
    font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.24em;
    text-transform:uppercase;color:var(--ink-mute);
    margin-bottom:48px;transition:gap .2s ease, color .2s ease;
  }
  .back-link:hover{gap:14px;color:var(--ink)}

  /* About page */
  .about-grid{
    display:grid;grid-template-columns:minmax(280px, 360px) 1fr;
    gap:60px;align-items:start;margin-bottom:90px;
  }
  .portrait{position:relative}
  .portrait-frame{
    position:relative;
    background:#fefcf6;padding:14px 14px 56px;
    border-radius:3px;
    box-shadow:0 8px 26px rgba(80,60,40,.18), 0 2px 6px rgba(80,60,40,.1);
    transform:rotate(-1.5deg);
  }
  .portrait-frame::before{
    content:"";position:absolute;top:-12px;left:50%;transform:translateX(-50%) rotate(-3deg);
    width:80px;height:22px;background:rgba(210,190,150,.55);
    box-shadow:0 1px 3px rgba(0,0,0,.06);
  }
  .portrait-img{
    width:100%;aspect-ratio:4/5;border-radius:2px;overflow:hidden;
    background:#222;
    position:relative;display:flex;align-items:flex-end;justify-content:center;
  }
  .portrait-img img{
    width:100%;height:100%;object-fit:cover;display:block;
    filter:saturate(1.05) contrast(1.02);
  }
  .portrait-caption{
    position:absolute;bottom:18px;left:0;right:0;text-align:center;
    font-family:'Caveat',cursive;font-size:18px;color:var(--ink-soft);
  }
  .portrait-stamp{
    position:absolute;top:-18px;right:-18px;z-index:3;
    width:88px;height:88px;border-radius:50%;
    background:var(--accent-teal);color:#fefcf6;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;font-family:'Fraunces',serif;
    box-shadow:0 4px 14px rgba(46,91,91,.4), inset 0 0 0 2px rgba(255,255,255,.25);
    transform:rotate(8deg);
  }
  .portrait-stamp .stamp-top{
    font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.22em;
    text-transform:uppercase;opacity:.85;
  }
  .portrait-stamp .stamp-big{font-size:24px;font-style:italic;font-weight:400;line-height:1;margin:2px 0}
  .portrait-stamp .stamp-bot{
    font-family:'Space Mono',monospace;font-size:7.5px;letter-spacing:.18em;
    text-transform:uppercase;opacity:.85;
  }

  .about-body h3{
    font-family:'Fraunces',serif;font-weight:400;font-size:28px;
    margin-bottom:22px;display:flex;align-items:center;gap:14px;letter-spacing:-.005em;
  }
  .about-body h3 .h-num{
    font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.28em;
    color:var(--accent-warm);font-weight:700;
  }
  .about-body h3 .h-text{
    font-style:italic;font-weight:400;color:var(--ink);
  }
  .about-body h3 .h-text .em{color:var(--accent-warm);font-weight:500}
  .about-body h3 .h-line{flex:1;height:1px;background:rgba(0,0,0,.12)}
  .about-summary{
    font-family:'Cormorant Garamond',serif;font-size:20px;line-height:1.65;
    color:var(--ink-soft);margin-bottom:18px;
  }
  .about-summary .accent{color:var(--accent-warm);font-style:italic;font-weight:500}
  .about-summary strong{color:var(--ink);font-weight:600;font-style:normal}
  .about-section{margin-bottom:58px}

  .skills-grid{
    display:grid;gap:22px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  }
  .skill-block{
    background:rgba(255,253,247,.6);
    border:1px solid rgba(0,0,0,.06);border-radius:12px;
    padding:22px;position:relative;
    transition:transform .3s ease, border-color .3s ease;
  }
  .skill-block:hover{transform:translateY(-3px);border-color:rgba(200,123,86,.35)}
  .skill-block .sb-cat{
    font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:.24em;
    text-transform:uppercase;color:var(--accent-warm);font-weight:700;margin-bottom:8px;
  }
  .skill-block h4{
    font-family:'Fraunces',serif;font-weight:400;font-size:20px;
    margin-bottom:14px;line-height:1.15;
  }
  .skill-tags{display:flex;flex-wrap:wrap;gap:6px}
  .skill-tag{
    font-family:'Inter',sans-serif;font-size:11.5px;
    padding:5px 10px;border-radius:99px;
    background:rgba(0,0,0,.04);color:var(--ink-soft);
    border:1px solid rgba(0,0,0,.05);
  }
  .skill-tag.hot{
    background:rgba(200,123,86,.12);color:var(--accent-deep);
    border-color:rgba(200,123,86,.25);font-weight:500;
  }

  .education-list{display:flex;flex-direction:column;gap:24px}
  .edu-item{
    display:grid;grid-template-columns:180px 1fr auto;gap:24px;align-items:baseline;
    padding-bottom:24px;border-bottom:1px solid rgba(0,0,0,.08);
  }
  .edu-item:last-child{border-bottom:none}
  .edu-date{
    font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.18em;
    color:var(--accent-warm);text-transform:uppercase;font-weight:700;
  }
  .edu-main h4{
    font-family:'Fraunces',serif;font-weight:500;font-size:22px;line-height:1.2;
    margin-bottom:4px;
  }
  .edu-main .edu-degree{
    font-style:italic;color:var(--ink-soft);font-family:'Cormorant Garamond',serif;font-size:18px;
  }
  .edu-main .edu-extra{
    font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.16em;
    color:var(--ink-mute);text-transform:uppercase;margin-top:6px;
  }
  .edu-gpa{
    font-family:'Fraunces',serif;font-style:italic;font-weight:500;
    font-size:30px;color:var(--accent-teal);
  }

  /* Experience timeline */
  .timeline{position:relative;padding-left:48px}
  .timeline::before{
    content:"";position:absolute;left:12px;top:8px;bottom:8px;width:1.5px;
    background:linear-gradient(to bottom,
      var(--accent-warm) 0%, var(--accent-warm) 70%,
      rgba(200,123,86,.2) 100%);
  }
  .timeline-item{position:relative;padding-bottom:64px}
  .timeline-item:last-child{padding-bottom:0}
  .timeline-item::before{
    content:"";position:absolute;left:-43px;top:10px;width:17px;height:17px;
    border-radius:50%;background:var(--paper);border:2.5px solid var(--accent-warm);
    z-index:2;box-shadow:0 0 0 5px rgba(200,123,86,.08);
  }
  .timeline-item.leadership::before{
    border-color:var(--accent-teal);box-shadow:0 0 0 5px rgba(46,91,91,.1);
  }
  .ti-date{
    font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.28em;
    color:var(--accent-warm);text-transform:uppercase;font-weight:700;margin-bottom:8px;
  }
  .timeline-item.leadership .ti-date{color:var(--accent-teal)}
  .ti-role{
    font-family:'Fraunces',serif;font-weight:500;font-size:32px;line-height:1.1;
    margin-bottom:4px;letter-spacing:-.01em;
  }
  .ti-company{
    font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;
    font-size:19px;color:var(--ink-soft);margin-bottom:6px;
  }
  .ti-meta{
    font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.2em;
    color:var(--ink-mute);text-transform:uppercase;margin-bottom:20px;
  }
  .ti-bullets{list-style:none;padding:0;display:flex;flex-direction:column;gap:14px;max-width:780px}
  .ti-bullets li{
    position:relative;padding-left:22px;font-size:15px;line-height:1.65;color:var(--ink-soft);
  }
  .ti-bullets li::before{
    content:"";position:absolute;left:0;top:12px;width:10px;height:1px;background:var(--accent-warm);
  }
  .timeline-item.leadership .ti-bullets li::before{background:var(--accent-teal)}
  .num{font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
  .num.warm{color:var(--accent-deep)}

  .leadership-divider{margin:80px 0 60px;display:flex;align-items:center;gap:24px}
  .leadership-divider .line{flex:1;height:1px;background:rgba(0,0,0,.12)}
  .leadership-divider .label{
    font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.4em;
    text-transform:uppercase;color:var(--accent-teal);font-weight:700;
  }

  /* Projects */
  .proj-category{margin-bottom:80px}
  .proj-category-head{
    display:flex;align-items:baseline;justify-content:space-between;
    margin-bottom:32px;gap:20px;flex-wrap:wrap;
  }
  .proj-category-head h2{
    font-family:'Fraunces',serif;font-weight:400;font-size:44px;line-height:1;letter-spacing:-.01em;
  }
  .proj-category-head h2 em{font-style:italic}
  .proj-category-head h2 em.warm{color:var(--accent-warm)}
  .proj-category-head h2 em.teal{color:var(--accent-teal)}
  .proj-category-head h2 em.plum{color:var(--accent-plum)}
  .proj-category-head .pc-count{
    font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.28em;
    text-transform:uppercase;color:var(--ink-mute);
  }
  .proj-grid{
    display:grid;gap:28px;grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
  }
  .proj-card{
    display:block;
    background:rgba(255,253,247,.7);
    border:1px solid rgba(0,0,0,.06);
    border-radius:14px;overflow:hidden;
    color:inherit;text-decoration:none;
    transition:transform .35s ease, box-shadow .35s ease;
  }
  .proj-card:hover{transform:translateY(-4px);box-shadow:0 14px 36px rgba(80,60,40,.12)}
  .proj-cover{
    aspect-ratio:5/3;position:relative;overflow:hidden;
    display:flex;align-items:center;justify-content:center;padding:0;
    background:#f4f1e9;
  }
  .proj-cover img{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  }
  .proj-cover.contain{background:#fff}
  .proj-cover.contain img{
    object-fit:contain;padding:24px;
  }
  .proj-cover::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(180deg, rgba(0,0,0,0) 50%, rgba(0,0,0,.35));
  }
  .proj-cover.contain::after{
    background:linear-gradient(180deg, rgba(0,0,0,0) 65%, rgba(0,0,0,.12));
  }
  .proj-cover .cv-num{
    position:absolute;top:14px;left:16px;z-index:2;
    font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.24em;
    color:rgba(255,255,255,.96);text-transform:uppercase;
    text-shadow:0 1px 4px rgba(0,0,0,.4);font-weight:700;
    pointer-events:none;
  }
  .proj-cover.contain .cv-num{
    color:var(--ink);background:rgba(255,255,255,.9);
    padding:4px 10px;border-radius:99px;text-shadow:none;
  }
  .proj-cover .cv-tag{
    position:absolute;bottom:14px;right:16px;z-index:2;
    font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:.22em;
    color:#fff;text-transform:uppercase;font-weight:700;
    border:1px solid rgba(255,255,255,.6);padding:5px 11px;border-radius:99px;
    backdrop-filter:blur(4px);
    background:rgba(0,0,0,.2);
    display:flex;align-items:center;gap:6px;
    pointer-events:none;
  }
  .proj-cover.contain .cv-tag{
    color:var(--ink);background:rgba(255,255,255,.95);
    border-color:rgba(0,0,0,.15);
  }
  .proj-cover .cv-tag .arr{font-size:11px}
  .proj-body{padding:24px 26px 28px}
  .proj-body h3{
    font-family:'Fraunces',serif;font-weight:500;font-size:24px;line-height:1.2;margin-bottom:6px;
  }
  .proj-body .pb-meta{
    font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--ink-mute);margin-bottom:14px;
  }
  .proj-body p{font-size:14.5px;line-height:1.65;color:var(--ink-soft)}
  .proj-tags{margin-top:16px;display:flex;flex-wrap:wrap;gap:6px}

  /* Contact */
  .contact-grid{
    display:grid;gap:24px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    margin-top:40px;
  }
  .contact-card{
    background:rgba(255,253,247,.75);border:1px solid rgba(0,0,0,.06);
    border-radius:16px;padding:36px 28px 32px;text-align:center;
    transition:transform .3s ease, box-shadow .3s ease;
    position:relative;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;color:inherit;
    text-decoration:none;
  }
  .contact-card::before{
    content:"";position:absolute;top:0;left:0;right:0;height:5px;
    background:linear-gradient(90deg, var(--accent-warm), var(--accent-teal));
    opacity:0;transition:opacity .3s ease;
  }
  .contact-card:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(80,60,40,.12)}
  .contact-card:hover::before{opacity:1}
  .contact-icon{
    width:56px;height:56px;border-radius:50%;
    background:linear-gradient(135deg, var(--accent-warm), var(--accent-deep));
    color:#fefcf6;display:flex;align-items:center;justify-content:center;
    font-size:24px;margin-bottom:18px;
    box-shadow:0 4px 14px rgba(200,123,86,.35);
  }
  .contact-card .cc-label{
    font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.28em;
    text-transform:uppercase;color:var(--ink-mute);margin-bottom:10px;
  }
  .contact-card .cc-value{
    font-family:'Fraunces',serif;font-size:18px;font-weight:400;
    color:var(--ink);word-break:break-word;line-height:1.35;
  }
  .contact-card .cc-cta{
    margin-top:18px;font-family:'Space Mono',monospace;font-size:10px;
    letter-spacing:.24em;text-transform:uppercase;color:var(--accent-warm);
    font-weight:700;display:inline-flex;align-items:center;gap:8px;
  }

const SESSIONS = [

function SessionCard({ s, onNavigate, idx }) {
  const Icon = s.icon;
  const [tick, setTick] = useState(0);
  useEffect(() => {
    let raf, last = performance.now();
    const loop = (now) => {
      if (now - last > 50) { setTick(t => (t + 1) % 100000); last = now; }
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, []);

  const phase = idx * 1.7;
  const dx = Math.sin(tick * 0.022 + phase) * 7;
  const dy = Math.cos(tick * 0.018 + phase) * 6;
  const dr = Math.sin(tick * 0.013 + phase) * 1.6;

  return html`<motion.button
    class=${`fc ${s.posClass}`}
    type="button"
    initial=${{ opacity: 0, scale: 0.84, x: 0, y: 0, rotate: 0 }}
    animate=${{ opacity: 1, scale: 1, x: dx, y: dy, rotate: dr }}
    transition=${{
      opacity: { duration: .8, delay: .25 + idx * 0.12 },
      scale:   { type: "spring", stiffness: 140, damping: 16, delay: .25 + idx * 0.12 },
      x:       { type: "tween", duration: 1.2, ease: "easeInOut" },
      y:       { type: "tween", duration: 1.2, ease: "easeInOut" },
      rotate:  { type: "tween", duration: 1.2, ease: "easeInOut" },
    }}
    whileHover=${{ scale: 1.06, zIndex: 30 }}
    onClick=${() => onNavigate(s.hash)}
    aria-label=${`Open ${s.label}`}
  >
    <div class="fc-inner">
      <div class="fc-illu"><${Icon} /></div>
      <div class="fc-label">${s.label}</div>
    </div>
  </motion.button>`;
}

function ProjectCard({ p, i }) {
  const coverClass = p.coverFit === "contain" ? "proj-cover contain" : "proj-cover";
  const handleClick = (e) => {
    /* Open the PDF — works both as native anchor and explicit window.open
       fallback (in case the embedded preview blocks target=_blank). */
    if (e.metaKey || e.ctrlKey || e.shiftKey) return;
    e.preventDefault();
    const w = window.open(p.pdf, "_blank", "noopener,noreferrer");
    if (!w) window.location.href = p.pdf;
  };
  return html`<motion.a
    class="proj-card"
    href=${p.pdf}
    target="_blank"
    rel="noopener noreferrer"
    onClick=${handleClick}
    initial=${{ opacity: 0, y: 24 }}
    whileInView=${{ opacity: 1, y: 0 }}
    viewport=${{ once: true, margin: "-60px" }}
    transition=${{ duration: .55, delay: i * 0.08, ease: [.2,.8,.2,1] }}
  >
    <div class=${coverClass}>
      <img src=${p.cover} alt=${p.title} />
      <span class="cv-num">0${i+1} · Project</span>
      <span class="cv-tag">Open File <span class="arr">↗</span></span>
    </div>
    <div class="proj-body">
      <h3>${p.title}</h3>
      <div class="pb-meta">${p.meta}</div>
      <p>${p.body}</p>
      <div class="proj-tags">
        ${p.tags.map((t,j) => html`<span class="skill-tag" key=${j}>${t}</span>`)}
      </div>
    </div>
  </motion.a>`;
}

function Nav({ route, onNavigate }) {
  const links = [
    { hash:"#about",      label:"About Me"   },
    { hash:"#experience", label:"Experience" },
    { hash:"#projects",   label:"Projects"   },
    { hash:"#contact",    label:"Contact"    },
  ];
  return html`<nav class="nav">
    <a class="nav-brand" href="#" onClick=${(e)=>{e.preventDefault();onNavigate("");}}>
      Portfolio
    </a>
    <div class="nav-links">
      ${links.map(l => html`<a
        key=${l.hash}
        href=${l.hash}
        class=${`nav-link ${route===l.hash?"active":""}`}
        onClick=${(e)=>{e.preventDefault();onNavigate(l.hash);}}
      >${l.label}</a>`)}
    </div>
    <div class="nav-right">
      <span class="nav-mark">Jamie · Min</span>
    </div>
  </nav>`;
}

function App(){
  const [route, setRoute] = useState(typeof window !== "undefined" ? window.location.hash : "");

  useEffect(() => {
    const onHash = () => setRoute(window.location.hash || "");
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  const onNavigate = (hash) => {
    if (hash === "") {
      try { history.pushState("", document.title, window.location.pathname + window.location.search); } catch(_){}
      setRoute("");
    } else {
      try { history.pushState(null, "", hash); } catch(_){}
      setRoute(hash);
    }
    window.scrollTo({ top: 0, behavior: "instant" });
  };

  let page;
  if      (route === "#about")      page = html`<${AboutPage}      key="a" onNavigate=${onNavigate} />`;
  else if (route === "#experience") page = html`<${ExperiencePage} key="e" onNavigate=${onNavigate} />`;
  else if (route === "#projects")   page = html`<${ProjectsPage}   key="p" onNavigate=${onNavigate} />`;
  else if (route === "#contact")    page = html`<${ContactPage}    key="c" onNavigate=${onNavigate} />`;
  else                              page = html`<${Hero}           key="h" onNavigate=${onNavigate} />`;

  return html`<${Fragment}>
    <${Nav} route=${route} onNavigate=${onNavigate} />
    ${page}
    <footer class="site-foot">
      <span>© Jamie Min · 2026 · Los Angeles</span>
      <span>Set in <em>Fraunces</em> & Inter <span class="heart">♡</span></span>
    </footer>
  <//>`;
}

createRoot(document.getElementById("root")).render(html`<${App} />`);
